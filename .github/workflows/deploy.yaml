name: CI/CD for Magazine Project

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker-image-build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Cloning repository
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin

      - name: API image build and push
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/magazine-api:latest ./Course_Work_Magazine
          docker push ${{secrets.DOCKER_USERNAME}}/magazine-api:latest

      - name: UI image build and push
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/magazine-ui:latest ./NEXIS-ONLINE-STORE-FRONT/my-app
          docker push ${{secrets.DOCKER_USERNAME}}/magazine-ui:latest

  deploy-to-aws-vm:
    needs: docker-image-build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: AWS VM deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.AWS_VM_HOST}}
          username: ${{secrets.AWS_VM_USERNAME}}
          key: ${{secrets.AWS_VM_SSH_KEY}}
          port: 22
          script: |
            if [ ! -d "DockerFinal/.git" ]; then
              git clone https://github.com/Tural364/DockerFinal.git
            fi
            cd DockerFinal
            git pull origin main
            docker-compose pull
            docker-compose down
            docker-compose up -d
            docker image prune -f
            